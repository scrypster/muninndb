name: Symbol Impact Analysis

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    name: Cymbal Impact Analysis
    runs-on: ubuntu-latest
    # Informational only — never blocks the gate.
    continue-on-error: true
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin to digest for reproducibility and supply-chain safety.
      - name: Pull cymbal image
        run: docker pull ghcr.io/1broseidon/cymbal@sha256:43f0bb34b73ac6580a0a2daaa6673d95ad28860dd4ff29f441515af3aedca607

      - name: Detect changed files
        id: detect
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.go')
          if [ -z "$CHANGED" ]; then
            echo "No Go files changed."
            echo '[]' > impact-report.json
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$CHANGED" > /tmp/changed-files.txt
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed Go files:"
          cat /tmp/changed-files.txt

      - name: Run cymbal analysis
        id: analyse
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          # Run all cymbal commands in a single container so the index persists.
          # Note: the cymbal image does not include jq, so we use plain-text
          # outline output with grep for symbol extraction, and write JSON
          # impact output to the mounted volume for host-side processing.
          docker run --rm \
            -v "$PWD":/workspace \
            -v /tmp/changed-files.txt:/tmp/changed-files.txt:ro \
            --entrypoint /bin/sh \
            ghcr.io/1broseidon/cymbal@sha256:43f0bb34b73ac6580a0a2daaa6673d95ad28860dd4ff29f441515af3aedca607 \
            -c '
              cd /workspace

              # Build index once
              cymbal index . 2>&1 | tail -1

              # Extract symbols from changed files using plain-text output.
              # Outline format: "kind name (Lstart-end)" — grep extracts the name.
              SYMBOLS=""
              while IFS= read -r file; do
                NAMES=$(cymbal outline "$file" 2>/dev/null \
                  | grep -oP "^(?:function|method|constant|type|struct|interface|variable|enum|trait|impl)\s+\K\S+" \
                  || true)
                if [ -n "$NAMES" ]; then
                  SYMBOLS=$(printf "%s\n%s" "$SYMBOLS" "$NAMES")
                fi
              done < /tmp/changed-files.txt

              SYMBOLS=$(echo "$SYMBOLS" | sort -u | sed "/^$/d")

              if [ -z "$SYMBOLS" ]; then
                echo "No symbols extracted from changed files."
                echo "[]" > impact-report.json
                exit 0
              fi

              echo "### Changed symbols"
              echo "$SYMBOLS"
              echo ""

              # Run impact analysis — write JSON to mounted volume.
              # Use xargs to handle large symbol lists; -n 200 keeps each
              # invocation well under ARG_MAX.
              printf "%s\n" "$SYMBOLS" \
                | xargs -r -n 200 cymbal impact --json 2>/dev/null \
                | tee impact-report.json || true

              ENTRIES=$(grep -c "\"caller\"" impact-report.json 2>/dev/null || echo 0)
              echo "### ~$ENTRIES impact entries"
            '

          # Host-side: validate and normalize the JSON report.
          if [ -f impact-report.json ] && jq -e '.results | length > 0' impact-report.json >/dev/null 2>&1; then
            echo "has_impact=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_impact=false" >> "$GITHUB_OUTPUT"
            # Ensure file exists for artifact upload
            [ -f impact-report.json ] || echo '[]' > impact-report.json
          fi

      - name: Comment impact on PR
        if: steps.analyse.outputs.has_impact == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'DELIM'
          ### 🔍 Cymbal Impact Analysis

          **Changed symbols and their upstream callers:**

          ```json
          DELIM
          )
          BODY+=$'\n'
          BODY+=$(head -100 impact-report.json)
          BODY+=$'\n```'

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

      - name: Upload impact report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cymbal-impact-report
          path: impact-report.json
          retention-days: 14
